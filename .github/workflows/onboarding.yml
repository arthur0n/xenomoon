name: onboarding

# Guards the clean-clone onboarding path — the one a forker actually walks but
# the maintainer never does (their project already has .claude/). Runs on
# every push/PR.
on:
  push:
  pull_request:

jobs:
  onboarding:
    name: Install + wiring (Tier 1)
    runs-on: ubuntu-latest
    env:
      # A clean clone has no .xenomoon.json binding; config.js resolves the active
      # domain at import, so the gate pins one explicitly (any shipped pack works).
      XENOMOON_DOMAIN: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # The full local gate (tsc + eslint + structure + skills + contamination) plus the
      # check-script tests — otherwise both live only in the bypassable husky hook.
      # validate includes check:structure.
      - run: npm run validate
      - run: npm test
      # Exports the repo as a forker receives it (git archive of tracked files),
      # installs into a fixture project, and asserts agents/skills/hook-merge —
      # including the godot-free assertions (no engine payload ships).
      - run: npm run test:onboarding
