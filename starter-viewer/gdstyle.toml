# gdstyle.toml — Xenodot Forge default GDScript lint config.
#
# gdstyle (https://github.com/atelico/gdstyle) is the IN-EDITOR linter: live,
# fixable diagnostics in the Godot editor (bottom panel) + `gdstyle fmt`. Install
# the editor plugin with `tools/install_gdstyle.sh` (pins v0.1.7); it also works
# on Redot 4.6. On Blazium (4.3-based) only the CLI backend runs — see
# docs/engines.md.
#
# IMPORTANT — gdstyle here is ADVISORY, not the gate:
#   * The BLOCKING headless gate is gdformat + gdlint via tools/validate.sh
#     (reliable exit codes; the user's caps + naming regexes). See godot-code-rules.
#   * gdstyle v0.1.7: per-rule "error" severity is a NO-OP — every finding reports
#     as "warning" and `gdstyle check` exits 0. Only "off" changes behavior. So
#     read this file as on/off toggles + caps; gdlint is what fails a build.
#   * When gdstyle ships a working error-severity exit code it can be promoted into
#     validate.sh as the gate. Tracking + rationale: library/tools/gdscript-linter.md

# --- Caps (gdstyle honors these top-level keys; they mirror gdlintrc) ---
max_line_length = 100        # gdlintrc max-line-length
use_tabs = true              # gdlintrc tab-characters
max_file_length = 500        # gdlintrc max-file-lines
max_parameters = 8           # gdlintrc function-arguments-number
max_public_methods = 20      # gdlintrc max-public-methods
max_returns = 6              # gdlintrc max-returns
max_function_length = 100    # godot-code-rules "~100 effective lines" (gdlint has no such rule)
exclude = [".godot", "addons", "library"]

[rules]
# --- OFF: gdlint owns these authoritatively (the validate.sh gate). Leaving them
#     on creates editor noise that contradicts the gate. ---
"order/class-member-order" = "off"          # gdlint class-definitions-order is the source of truth
"naming/function-name-snake-case" = "off"   # gdlint allows the _on_<Node>_<signal> handler regex

# --- OFF: disabled in gdlintrc (parity) and/or owned by gdformat ---
"quality/self-comparison" = "off"           # = gdlint comparison-with-itself: null
"quality/duplicated-load" = "off"           # = gdlint duplicated-load: null
"quality/no-else-return" = "off"            # = gdlint no-else-return / no-elif-return: null
"quality/unnecessary-pass" = "off"          # = gdlint unnecessary-pass: null
"format/trailing-whitespace" = "off"        # = gdlint trailing-whitespace: null (gdformat fixes it)

# --- OFF: gdstyle v0.1.7 false-positive. It misreads `Namespace.MEMBER` used as a
#     dict VALUE as a duplicate key (fires 22x on a single ArtStyle-driven specs
#     file). Re-enable when fixed upstream. See library/tools/gdscript-linter.md. ---
"quality/duplicate-dict-key" = "off"

# --- OFF: opinionated style gdformat/gdlint don't enforce here (avoid churn) ---
"format/number-literals" = "off"
"format/large-number-underscores" = "off"
"format/double-quotes" = "off"

# --- Left ON (advisory "warn") on purpose — signals gdlint cannot give: ---
#   quality/max-class-variables   the god-class smell (a "too many responsibilities" proxy)
#   quality/max-function-length / max-parameters / max-returns / max-public-methods (caps above)
#   quality/allocation-in-loop / await-in-loop / process-get-node   perf hot-path hints
#   quality/max-nesting-depth / max-branches / max-local-variables  complexity hints
#   quality/type-hint / quality/no-debug-print                      typing + leftover-print discipline
#   naming/* (class/variable/constant/signal/enum/...) + format/*   live style hints in-editor
